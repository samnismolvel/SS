

name: Build Tauri App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./SS

      - name: Download FFmpeg for Windows
        run: |
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          7z x ffmpeg.zip
          mkdir -p SS/src-tauri/binaries
          copy ffmpeg-*-essentials_build\bin\ffmpeg.exe SS\src-tauri\binaries\ffmpeg.exe
        shell: cmd

      - name: Build whisper.cpp
        run: |
          git clone https://github.com/ggerganov/whisper.cpp
          cd whisper.cpp
          mkdir build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release
        shell: cmd

      - name: Download whisper tiny model
        run: |
          mkdir whisper.cpp\models
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin" -o whisper.cpp\models\ggml-tiny.bin
        shell: cmd

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: ./SS

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: SS/src-tauri/target/release/bundle/msi/*.msi