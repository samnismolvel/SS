name: Build Tauri App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: ./SS
        run: npm install

      - name: Download FFmpeg for Windows
        working-directory: ./SS
        shell: pwsh
        run: |
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          $ffmpegExe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_extracted | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName "src-tauri/binaries/ffmpeg.exe"

      - name: Clone and build whisper.cpp
        shell: pwsh
        run: |
          git clone https://github.com/ggerganov/whisper.cpp
          cd whisper.cpp
          New-Item -ItemType Directory -Force -Path build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release

      - name: Download whisper tiny model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "whisper.cpp/models"
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin" -o "whisper.cpp/models/ggml-tiny.bin"

      - name: Build Tauri app
        working-directory: ./SS
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: SS/src-tauri/target/release/bundle/msi/*.msi

          